# Scraped by prometheus-user-workload when namespace ocudu has
# openshift.io/user-monitoring=true (not cluster-monitoring=true — that label excludes
# the namespace from UWM). See 00-install-telegraf.sh.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ocudu-telegraf
  namespace: ocudu
  labels:
    app.kubernetes.io/name: ocudu-telegraf
    openshift.io/user-monitoring: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ocudu-telegraf
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: http
