apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: lvmcluster
  namespace: openshift-storage
spec:
  storage:
    deviceClasses:
      - name: vg1
        # Dedicated block device for TopoLVM (confirm with lsblk -f on the node).
        # nvme0n1 is often the OS disk — only use if this VG is intended for that device and
        # layout (whole disk unpartitioned, or use e.g. /dev/nvme0n1pN if partitioned).
        deviceSelector:
          paths:
            - /dev/nvme0n1
        thinPoolConfig:
          name: thin-pool-1
          overprovisionRatio: 10
          sizePercent: 90
