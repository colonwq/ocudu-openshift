apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: lvmcluster
  namespace: openshift-storage
spec:
  storage:
    deviceClasses:
      - name: vg1
        # Dedicated 1.7T NVMe (see lsblk: nvme1n1 unpartitioned); OS/root is on nvme0n1
        deviceSelector:
          paths:
            - /dev/nvme1n1
        thinPoolConfig:
          name: thin-pool-1
          overprovisionRatio: 10
          sizePercent: 90
