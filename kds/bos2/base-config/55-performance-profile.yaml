# Same PerformanceProfile as 50-performance.yaml (64 CPUs; 00-install-base.sh applies 50-performance.yaml only).
apiVersion: performance.openshift.io/v2
kind: PerformanceProfile
metadata:
  name: gnb-performance-profile
spec:
  cpu:
    isolated: "4-63"
    reserved: "0-3"

  realTimeKernel:
    enabled: true

  # 1G hugepages: 51-master-gnb-hugepages-kargs.yaml (see 50-performance.yaml / 00-install-base.sh).

  workloadHints:
    realTime: true
    highPowerConsumption: true
    perPodPowerManagement: false

  nodeSelector:
    node-role.kubernetes.io/master: ""
