# Custom manifest for OpenShift Assisted Installer (Web UI → Custom manifests) or agent-based install.
#
# Clears LVM (if any), partition signatures, and GPT on /dev/nvme0n1 and /dev/nvme1n1 on the node's
# FIRST boot after this MachineConfig is applied — runs before kubelet.
#
# SAFETY: The block device that holds / (your OS disk) is NEVER wiped. On a typical SNO install with
# root on nvme1n1p4, only nvme0n1 (e.g. old TopoLVM vg1) is cleared; nvme1n1 is skipped.
#
# You cannot use a post-install MachineConfig to wipe the same disk the cluster was just installed
# onto — that disk is already root. To reinstall with a clean nvme1n1, wipe it from discovery/live
# media before install, or use the installer's formatting for the installation disk.
#
# After editing, add this YAML under Assisted Installer → Custom manifests (enable the feature).
# For an existing cluster: oc apply -f 91-assisted-installer-wipe-nvme-machineconfig.yaml
# Expect an MCO reboot cycle on the node.
---
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: 91-master-assisted-wipe-nvme
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /usr/local/sbin/assisted-nvme-wipe.sh
          mode: 0755
          overwrite: true
          contents:
            compression: gzip
            source: data:;base64,
    systemd:
      units:
        - name: assisted-nvme-wipe.service
          enabled: true
          contents: |
            [Unit]
            Description=Assisted install: wipe non-root NVMe disks (nvme0n1/nvme1n1) once before kubelet
            Documentation=https://docs.openshift.com/container-platform/latest/installing/index.html
            DefaultDependencies=no
            Before=kubelet.service
            After=systemd-udevd.service
            ConditionPathExists=!/var/lib/.openshift-assisted-nvme-wipe.done

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/local/sbin/assisted-nvme-wipe.sh

            [Install]
            WantedBy=multi-user.target
