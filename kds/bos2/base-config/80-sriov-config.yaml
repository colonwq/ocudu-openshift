# If allocatable has no openshift.io/sriov_* resource: run 82-sriov-diagnose.sh <n>.
# Prefer rootDevices (PCI) over pfNames when interface names shift; use 0000:12:00.0 for second NIC (ens2f0).
# If sync succeeds but allocatable stays empty, check vfio + device-plugin logs (see script).
---
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetworkNodePolicy
metadata:
  name: sriov-policy-node-2
  namespace: openshift-sriov-network-operator 
spec:
  # Resource name for pod scheduling (OCP 4.21+: kubelet advertises openshift.io/<resourceName>; verify with oc describe node)
  resourceName: sriov_gnb_ens1f0
  # Match SNO / control-plane node (same idea as gnb-performance-profile). For multi-node,
  # replace with the worker label or hostname of the node that owns the SR-IOV PF.
  nodeSelector:
    node-role.kubernetes.io/master: ""
  priority: 10
  mtu: 9000
  numVfs: 16
  nicSelector:
    # First Intel E810 PF on this HPE host (see SriovNetworkNodeState / lspci). gNB app still uses net name ens1f0 in values.
    rootDevices:
      - "0000:10:00.0"
  # vfio-pci is required for high-performance gNB pod access
  deviceType: vfio-pci
  isRdma: false 
  needVhostNet: false 
---
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetwork
metadata:
  name: sriov-ocudu
  namespace: openshift-sriov-network-operator 
spec:
  resourceName: sriov_gnb_ens1f0
  networkNamespace: ocudu
  # No VLAN: untagged L2 on PF/VF (match lab; use VLAN only if switching requires it)
  spoofChk: "on"
  trust: "on"
  # Empty IPAM: kernel does not assign an address on the VF (typical for DPDK/vfio). A "static" stanza
  # without addresses causes Multus: IPAM plugin returned missing IP config.
  ipam: |-
    {}
  linkState: "auto"
  capabilities: '{"mac": true}'
