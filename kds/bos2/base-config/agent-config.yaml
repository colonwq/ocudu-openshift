# Assisted install (SNO): VLAN 50 + jumbo MTU on the lab-facing NIC.
# Host NIC: ens1f0 (altname enp16s0f0), MAC from `ip a` on the target node.

apiVersion: v1beta1
kind: AgentConfig
metadata:
  name: sno-cluster
hosts:
  - hostname: node-2.example.com
    interfaces:
      - name: ens1f0
        macAddress: "b4:96:91:c4:d2:64"
    networkConfig:
      interfaces:
        - name: ens1f0
          type: ethernet
          state: up
          mtu: 9000
        - name: ens1f0.50
          type: vlan
          state: up
          mtu: 9000
          vlan:
            base-iface: ens1f0
            id: 50
          ipv4:
            enabled: true
            dhcp: true
