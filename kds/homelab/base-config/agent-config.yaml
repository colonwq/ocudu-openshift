#This is for doing an assisted install on node-2
#It sets the interface for VLAN50 in the lab and
#enables jumbo frames

apiVersion: v1beta1
kind: AgentConfig
metadata:
  name: sno-cluster
hosts:
  - hostname: node-2.example.com
    interfaces:
      - name: enp2s0
        macAddress: "84:47:09:3e:a0:3d"
    networkConfig:
      interfaces:
        - name: enp2s0
          type: ethernet
          state: up
          mtu: 9000
        - name: enp2s0.50
          type: vlan
          state: up
          mtu: 9000
          vlan:
            base-iface: enp2s0
            id: 50
          ipv4:
            enabled: true
            dhcp: true
