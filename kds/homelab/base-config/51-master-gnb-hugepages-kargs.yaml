# 8x 1G hugepages at boot for DPDK / ocudu-gnb. Applied by 00-install-base.sh after 50-performance.yaml.
---
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: 51-master-gnb-hugepages-kargs
spec:
  kernelArguments:
    - default_hugepagesz=1G
    - hugepagesz=1G
    - hugepages=8
