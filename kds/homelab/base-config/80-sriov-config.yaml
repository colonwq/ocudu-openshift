# If allocatable has no openshift.io/sriov_* resource: run bos2/base-config/82-sriov-diagnose.sh <n>.
---
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetworkNodePolicy
metadata:
  name: sriov-policy-node-2
  namespace: openshift-sriov-network-operator 
spec:
  # Resource name for pod scheduling (OCP 4.21+: kubelet advertises openshift.io/<resourceName>)
  resourceName: sriov_gnb_enp2s0
  # Match SNO / control-plane node. For multi-node, narrow to the target worker/hostname.
  nodeSelector:
    node-role.kubernetes.io/master: ""
  priority: 10
  mtu: 9000
  numVfs: 16
  nicSelector: 
    # Directly targeting the enp2s0 physical interface
    pfNames: ["enp2s0#0-15"]
  # vfio-pci is required for high-performance gNB pod access
  deviceType: vfio-pci
  isRdma: false 
  needVhostNet: false 
---
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetwork
metadata:
  name: sriov-ocudu
  namespace: openshift-sriov-network-operator 
spec:
  resourceName: sriov_gnb_enp2s0
  networkNamespace: ocudu
  spoofChk: "off"
  trust: "on"
  # Empty IPAM: see bos2/base-config/80-sriov-config.yaml (static without addresses breaks CNI).
  ipam: |-
    {}
  linkState: "auto"
  capabilities: '{"mac": true}'
